name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: registry.core.mohjave.com
          username: ${{ secrets.REGISTRY_HTPASSWD_USER }}
          password: ${{ secrets.REGISTRY_HTPASSWD_PASS }}

      - name: Build image for testing
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: mowmo:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration tests
        run: docker run --rm mowmo:test /bin/bash /usr/local/share/mowmo/tests/integration/run-tests.sh

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: registry.core.mohjave.com/mowmo
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
